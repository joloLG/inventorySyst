<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory System</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Login/Register Section -->
        <div id="auth-section" class="section">
            <div class="auth-container">
                <h1>Inventory Management System</h1>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>
                
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                
                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <div class="form-group">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" required>
                    </div>
                    <div class="form-group">
                        <label for="register-role">Role</label>
                        <select id="register-role" required>
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit">Register</button>
                </form>
                
                <div id="auth-message" class="message"></div>
            </div>
        </div>

        <!-- Main Application Section -->
        <div id="main-section" class="section hidden">
            <header>
                <nav>
                    <div class="nav-brand">
                        <h1>Inventory System</h1>
                    </div>
                    <div class="nav-menu">
                        <button id="dashboard-btn" class="nav-btn">Dashboard</button>
                        <button id="categories-btn" class="nav-btn">Categories</button>
                        <button id="classes-btn" class="nav-btn">Classes</button>
                        <button id="items-btn" class="nav-btn">Items</button>
                        <button id="admin-btn" class="nav-btn hidden">Admin</button>
                        <button id="logout-btn" class="nav-btn">Logout</button>
                    </div>
                </nav>
            </header>

            <main>
                <!-- Dashboard View -->
                <div id="dashboard-view" class="view active">
                    <h2>Dashboard</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Total Categories</h3>
                            <p id="total-categories">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Total Classes</h3>
                            <p id="total-classes">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Total Items</h3>
                            <p id="total-items">0</p>
                        </div>
                    </div>
                    <div class="recent-items">
                        <h3>Recent Items</h3>
                        <div id="recent-items-list"></div>
                    </div>
                </div>

                <!-- Categories View -->
                <div id="categories-view" class="view">
                    <div class="view-header">
                        <h2>Categories</h2>
                        <button id="add-category-btn" class="btn-primary">Add Category</button>
                    </div>
                    <div id="categories-list"></div>
                </div>

                <!-- Classes View -->
                <div id="classes-view" class="view">
                    <div class="view-header">
                        <h2>Classes</h2>
                        <button id="add-class-btn" class="btn-primary">Add Class</button>
                    </div>
                    <div id="classes-list"></div>
                </div>

                <!-- Items View -->
                <div id="items-view" class="view">
                    <div class="view-header">
                        <h2>Items</h2>
                        <button id="add-item-btn" class="btn-primary">Add Item</button>
                    </div>
                    <div id="items-list"></div>
                </div>

                <!-- Admin View -->
                <div id="admin-view" class="view">
                    <h2>Admin Dashboard</h2>
                    <div class="admin-tabs">
                        <button class="admin-tab-btn active" data-admin-tab="summary">Inventory Summary</button>
                        <button class="admin-tab-btn" data-admin-tab="details">User Details</button>
                    </div>
                    
                    <div id="admin-summary" class="admin-content active">
                        <h3>Inventory Summary</h3>
                        <div id="inventory-summary"></div>
                    </div>
                    
                    <div id="admin-details" class="admin-content">
                        <h3>User Inventory Details</h3>
                        <div id="user-details"></div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Modal for Forms -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
